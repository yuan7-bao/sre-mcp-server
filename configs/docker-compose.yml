# Windows Docker Desktop 兼容版
# 去掉了 node-exporter/cAdvisor（需要 Linux 内核挂载），用 nginx + prometheus 自身指标做演示

services:
  # ============= Prometheus =============
  prometheus:
    image: prom/prometheus:latest
    container_name: sre-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerting-rules.yml:/etc/prometheus/alerting-rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped

  # ============= Grafana =============
  grafana:
    image: grafana/grafana:latest
    container_name: sre-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # ============= Loki =============
  loki:
    image: grafana/loki:latest
    container_name: sre-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # ============= Demo App (nginx 自带 stub_status 指标) =============
  demo-app:
    image: nginx:alpine
    container_name: sre-demo-app
    ports:
      - "8081:80"
    restart: unless-stopped

  # ============= Prometheus 自身作为 demo 指标源 =============
  # Prometheus 默认暴露自身 /metrics，已在 prometheus.yml 配置

volumes:
  prometheus-data:
  grafana-data:
